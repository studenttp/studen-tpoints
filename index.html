<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نجوم صفي</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">
    <div>
        <h1>نجوم صفي</h1>
        <p>✨ كل جهد يُبذل ... يستحق التقدير ✨</p>
    </div>
</section>


<section class="search">
    <h2>أبحث عن نجمك</h2>

    <input id="code" placeholder="أدخل رمز الطالب">

    <button onclick="searchStudent()">بحث</button>

    <div id="result"></div>
</section>


<section class="star">
    <h2>⭐ نجم الصف لهذا الشهر ⭐</h2>
    <div class="card">
        <h3 id="monthStar">سيتم تحديده لاحقًا</h3>
    </div>
</section>


<section class="points">

<h2>دليل النقاط</h2>

<ul>
<li>الهدوء +2</li>
<li>المشاركة +3</li>
<li>التعاون +2</li>
<li>حل الواجب +5</li>
<li>الدرجات النهائية +5</li>
</ul>

<p>يتم خصم النقاط عند عدم الالتزام بقوانين الصف</p>

</section>


<script src="script.js"></script>

</body>
</html>
